<style>
  :root {
    --font-sans: 'Inter', system-ui, sans-serif;

    --c-bg: #f9fafb;
    --c-card: #ffffff;
    --c-border: #e5e7eb;
    --c-accent: #1D9E75;
    --c-accent-dark: #0F6E56;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: var(--font-sans); background: var(--c-bg); color: var(--c-text); font-size: 15px; -webkit-tap-highlight-color: transparent; }
  .topbar { position: sticky; top:0; z-index:10; background: var(--c-card); border-bottom: 1px solid var(--c-border); padding: 14px 16px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-weight:700; font-size:16px; }
  .logo span { color: var(--c-accent); }
  .wrap { max-width: 520px; margin: 0 auto; padding: 16px 16px 100px; }
  .step { background: var(--c-card); border:1px solid var(--c-border); border-radius: var(--radius); padding:16px; margin-bottom:14px; }
  .step-label { font-size:12px; font-weight:600; color: var(--c-accent-dark); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
  label.field-label { display:block; font-size:13px; font-weight:600; margin: 12px 0 6px; color: var(--c-text); }
  select, input[type=text], input[type=number], input[type=date] {
    width:100%; padding: 12px 14px; font-size:16px; font-family: var(--font-sans);
    border:1px solid var(--c-border); border-radius:10px; background:#fff; color: var(--c-text);
  }
  select:focus, input:focus { outline:none; border-color: var(--c-accent); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  .town-block, .product-block { border:1px solid var(--c-border); border-radius:10px; padding:12px; margin-bottom:10px; background: var(--c-bg); position:relative; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .remove-btn { position:absolute; top:8px; right:8px; background:none; border:none; color:var(--c-danger); font-size:18px; cursor:pointer; padding:4px; line-height:1; }
  .add-btn { width:100%; padding:12px; background:#fff; border:1.5px dashed var(--c-accent); color: var(--c-accent-dark); border-radius:10px; font-weight:600; font-size:14px; cursor:pointer; margin-top:4px; }
  .add-btn:active { background: #E1F5EE; }
  .submit-bar { position:fixed; bottom:0; left:0; right:0; background: var(--c-card); border-top:1px solid var(--c-border); padding:12px 16px; z-index:20; }
  .submit-btn { width:100%; max-width:520px; margin:0 auto; display:block; padding:15px; background: var(--c-accent); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
  .submit-btn:disabled { background:#9ca3af; }
  .totals-row { display:flex; justify-content:space-between; font-size:13px; color: var(--c-text-secondary); padding: 8px 2px 0; }
  .totals-row b { color: var(--c-text); }
  #msgBox { text-align:center; padding: 60px 20px; }
  #msgBox .ti-circle-check { font-size:56px; color: var(--c-accent); }
  #msgBox .ti-alert-circle { font-size:56px; color: var(--c-danger); }
  #msgBox h2 { margin: 16px 0 8px; }
  #msgBox p { color: var(--c-text-secondary); margin-bottom: 20px; }
  #msgBox button { padding:12px 24px; background: var(--c-accent); color:#fff; border:none; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer; }
  .hint { font-size:12px; color: var(--c-text-secondary); margin-top:4px; }
  .error-text { font-size:13px; color: var(--c-danger); margin-top:8px; display:none; }
  datalist {}
</style>
</head>

let deferredInstallPrompt = null;
const installBtn = document.getElementById('installBtn');
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

if (!isStandalone) {
  if (isIOS) {
    installBtn.style.display = 'inline-flex';
    installBtn.onclick = () => alert('To install: tap the Share icon in Safari, then "Add to Home Screen".');
  } else {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      installBtn.style.display = 'inline-flex';
    });
    installBtn.onclick = async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installBtn.style.display = 'none';
    };
    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });
  }
}


function todayISO() {
  const d = new Date();
  const tz = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return tz.toISOString().slice(0,10);
}
document.getElementById('reportDate').value = todayISO();
document.getElementById('reportDate').max = todayISO();

const soByCode = {};
SO_ROSTER.forEach(s => soByCode[s.code] = s);

let townRowCount = 0;
let productRowCount = 0;

function currentTownOptionsHTML(soCode) {
  const so = soByCode[soCode];
  const key = so ? Object.keys(SO_TOWNS).find(k => k === so.name.toUpperCase()) : null;
  const list = key ? SO_TOWNS[key] : [];
  return list.map(t => `<option value="${t}">${t}</option>`).join('');
}

function addTownRow() {
  townRowCount++;
  const id = townRowCount;
  const soCode = document.getElementById('soSelect').value;
  const div = document.createElement('div');
  div.className = 'town-block';
  div.id = `town-${id}`;
  div.innerHTML = `
    <button type="button" class="remove-btn" onclick="removeBlock('town-${id}')"><i class="ti ti-x"></i></button>
    <label class="field-label" style="margin-top:0;">Town</label>
    <input type="text" list="townOptions-${id}" class="townNameInput" placeholder="Select or type town name">
    <datalist id="townOptions-${id}">${currentTownOptionsHTML(soCode)}</datalist>
    <label class="field-label">Retailers Met</label>
    <input type="number" class="townRetailersInput" min="0" placeholder="0" oninput="recalcTotals()">
  `;
  document.getElementById('townList').appendChild(div);
}

function addProductRow() {
  productRowCount++;
  const id = productRowCount;
  const div = document.createElement('div');
  div.className = 'product-block';
  div.id = `product-${id}`;
  div.innerHTML = `
    <button type="button" class="remove-btn" onclick="removeBlock('product-${id}')"><i class="ti ti-x"></i></button>
    <label class="field-label" style="margin-top:0;">Product</label>
    <input type="text" list="productOptions" class="productNameInput" placeholder="Select or type product name" oninput="recalcProductRow(${id})">
    <label class="field-label">Quantity Sold</label>
    <input type="number" class="productQtyInput" min="0" placeholder="0" oninput="recalcProductRow(${id})">
    <div class="hint" id="productAmt-${id}"></div>
  `;
  document.getElementById('productList').appendChild(div);
}

function recalcProductRow(id) {
  const block = document.getElementById(`product-${id}`);
  const name = block.querySelector('.productNameInput').value.trim();
  const qty = Number(block.querySelector('.productQtyInput').value) || 0;
  const amtEl = document.getElementById(`productAmt-${id}`);
  const ptd = PRODUCT_PTD.hasOwnProperty(name) ? PRODUCT_PTD[name] : undefined;
  if (name && ptd == null) {
    amtEl.textContent = ptd === undefined ? '' : 'PTD not on file — amount not auto-calculated for this product.';
    amtEl.style.color = 'var(--c-danger)';
  } else if (name && qty > 0) {
    amtEl.textContent = `PTD ₹${ptd} × ${qty} = ₹${(ptd*qty).toLocaleString()}`;
    amtEl.style.color = 'var(--c-text-secondary)';
  } else {
    amtEl.textContent = '';
  }
  recalcProductTotal();
}

function recalcProductTotal() {
  let total = 0;
  document.querySelectorAll('.product-block').forEach(block => {
    const name = block.querySelector('.productNameInput').value.trim();
    const qty = Number(block.querySelector('.productQtyInput').value) || 0;
    const ptd = PRODUCT_PTD[name];
    if (name && ptd != null && qty > 0) total += ptd * qty;
  });
  const el = document.getElementById('productPobTotal');
  if (el) el.textContent = '₹' + total.toLocaleString();
}

function removeBlock(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  recalcTotals();
  recalcProductTotal();
}

function recalcTotals() {
  let ret = 0;
  document.querySelectorAll('.townRetailersInput').forEach(i => ret += Number(i.value) || 0);
  document.getElementById('totalRetailersDisplay').textContent = ret;
}

// shared product datalist (created once)
const productDatalist = document.createElement('datalist');
productDatalist.id = 'productOptions';
productDatalist.innerHTML = PRODUCTS.map(p => `<option value="${p}"></option>`).join('');
document.body.appendChild(productDatalist);

document.getElementById('addTownBtn').onclick = addTownRow;
document.getElementById('addProductBtn').onclick = addProductRow;
document.getElementById('soSelect').onchange = () => {
  // refresh town suggestions on existing rows to match newly selected SO
  document.querySelectorAll('.town-block').forEach(block => {
    const dl = block.querySelector('datalist');
    dl.innerHTML = currentTownOptionsHTML(document.getElementById('soSelect').value);
  });
};

// start with one town row and one product row for convenience
addTownRow();

// ---------- submit ----------
document.getElementById('submitBtn').onclick = async () => {
  const errEl = document.getElementById('formError');
  errEl.style.display = 'none';

  const soCode = document.getElementById('soSelect').value;
  const date = document.getElementById('reportDate').value;
  if (!soCode) { errEl.textContent = 'Please select your name.'; errEl.style.display='block'; window.scrollTo(0,0); return; }
  if (!date) { errEl.textContent = 'Please select a date.'; errEl.style.display='block'; return; }

  const towns = [];
  document.querySelectorAll('.town-block').forEach(block => {
    const name = block.querySelector('.townNameInput').value.trim();
    const retailers = Number(block.querySelector('.townRetailersInput').value) || 0;
    if (name) towns.push({ town: name, retailers_met: retailers });
  });
  if (!towns.length) { errEl.textContent = 'Add at least one town visited today.'; errEl.style.display='block'; return; }

  const products = [];
  document.querySelectorAll('.product-block').forEach(block => {
    const name = block.querySelector('.productNameInput').value.trim();
    const qty = Number(block.querySelector('.productQtyInput').value) || 0;
    const ptd = PRODUCT_PTD[name];
    const amount = (qty > 0 && ptd != null) ? ptd * qty : 0;
    if (name && qty > 0) products.push({ product: name, qty, ptd: ptd != null ? ptd : null, amount });
  });
  const productPobTotal = products.reduce((s,p) => s + (p.amount||0), 0);
  if (!products.length) { errEl.textContent = 'Add at least one product sold today — this is now how POB is calculated.'; errEl.style.display='block'; return; }

  const so = soByCode[soCode];
  const totalRetailers = towns.reduce((s,t) => s + t.retailers_met, 0);

  const pcVal = document.getElementById('pcInput').value;
  const productiveCalls = pcVal === '' ? null : Number(pcVal);
  if (productiveCalls === null || productiveCalls < 0) { errEl.textContent = 'Enter productive calls (PC) — how many chemists gave an order today.'; errEl.style.display='block'; return; }

  const record = {
    so_name: so.name,
    hq: so.hq,
    state: so.state,
    pob_done: productPobTotal,
    retailers_met: totalRetailers,
    pc: productiveCalls,
    towns_visited: towns.length,
    route: towns.map(t => t.town).join(', '),
    towns: towns,
    products: products,
    matched: true,
    is_clean: true,
    source: 'form',
    submitted_at: Date.now()
  };

  // ---- guard against silently overwriting an existing report for this SO+date ----
  try {
    const existingSnap = await db.ref(`/reports/${date}/${soCode}`).get();
    if (existingSnap.exists()) {
      const existing = existingSnap.val();
      const existingTime = existing.submitted_at ? new Date(existing.submitted_at).toLocaleTimeString() : 'earlier';
      const ok = confirm(`You already submitted a report for ${date} at ${existingTime}.\n\nSubmitting again will REPLACE that report. Continue?`);
      if (!ok) return;
    }
  } catch (e) {
    // if the existence check itself fails, fall through and let the normal submit try/catch handle it
  }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Submitting...';

  try {
    await db.ref(`/reports/${date}/${soCode}`).set(record);
    showMessage(true, so.name, date, productPobTotal, towns.length, products.length);
  } catch (e) {
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Submit Report';
    errEl.textContent = 'Could not submit — check your internet connection and try again. (' + e.message + ')';
    errEl.style.display = 'block';
  }
};

function showMessage(success, soName, date, pob, townCount, productCount) {
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('submitBar').style.display = 'none';
  const box = document.getElementById('msgBox');
  box.style.display = 'block';
  box.innerHTML = `
    <i class="ti ti-circle-check"></i>
    <h2>Report Submitted</h2>
    <p>${soName.replace(/\b\w/g, c => c.toUpperCase())} — ${date}<br>
    ₹${pob.toLocaleString()} POB across ${townCount} town(s), ${productCount} product(s) logged.</p>
    <button onclick="location.reload()">Submit Another / Edit Today's Report</button>
  `;
}
</script>
</body>
</html>

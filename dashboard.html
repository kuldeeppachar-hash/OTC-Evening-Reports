<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OTC Evening Reports Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --font-sans: 'Inter', system-ui, sans-serif;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #6b7280;
    --color-text-danger: #dc2626;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f9fafb;
    --color-border-primary: #d1d5db;
    --color-border-secondary: #e5e7eb;
    --color-border-tertiary: #f3f4f6;
    --border-radius-sm: 4px;
    --border-radius-md: 6px;
    --border-radius-lg: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); background: var(--color-background-secondary); }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--color-border-secondary); background: var(--color-background-primary); position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }
  .logo span { color: #1D9E75; }
  .realtime-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #0F6E56; background: #E1F5EE; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .realtime-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; animation: pulse 1.5s infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .content { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .page-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .filter-row select { padding: 8px 12px; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); }
  .filter-row select:focus { outline: none; border-color: #1D9E75; box-shadow: 0 0 0 2px rgba(29,158,117,0.12); }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 24px; font-weight: 600; }
  .stat-val.danger { color: var(--color-text-danger); }
  .stat-val.success { color: #0F6E56; }
  .card { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 0; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--color-border-secondary); color: var(--color-text-secondary); font-weight: 500; font-size: 12px; white-space: nowrap; background: var(--color-background-secondary); }
  td { padding: 9px 12px; border-bottom: 1px solid var(--color-border-tertiary); vertical-align: middle; }
  tr:hover td { background: #f9fafb; }
  .status-pill { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; display: inline-block; }
  .s-reported { background: #E1F5EE; color: #085041; }
  .s-missing { background: #fef2f2; color: #dc2626; }
  .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--color-text-secondary); gap: 8px; }
  @media(max-width:700px) { .stat-grid{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">OTC <span>Evening Reports</span></span>
  <div style="display:flex; align-items:center; gap:10px;">
    <span class="realtime-badge">Live</span>
    <a href="admin.html" title="Admin upload" style="color:var(--color-text-secondary); font-size:16px; text-decoration:none;"><i class="ti ti-settings"></i></a>
  </div>
</div>

<div class="content">
  <div class="page-title">Compliance Dashboard</div>

  <div class="filter-row">
    <select id="dateSelect"></select>
  </div>

  <div class="filter-row" style="background:var(--color-background-primary); border:1px solid var(--color-border-secondary); border-radius:var(--border-radius-md); padding:12px 14px;">
    <label style="font-size:12px; color:var(--color-text-secondary); font-weight:500;">Export range:&nbsp;</label>
    <input type="date" id="exportFrom" style="padding:7px 10px; border:1px solid var(--color-border-secondary); border-radius:6px; font-family:var(--font-sans); font-size:13px;">
    <span style="color:var(--color-text-secondary);">to</span>
    <input type="date" id="exportTo" style="padding:7px 10px; border:1px solid var(--color-border-secondary); border-radius:6px; font-family:var(--font-sans); font-size:13px;">
    <button id="exportBtn" style="background:#1D9E75; color:#fff; border:none; padding:8px 16px; border-radius:6px; font-size:13px; cursor:pointer; font-family:var(--font-sans);">
      <i class="ti ti-file-spreadsheet"></i> Export to Excel
    </button>
    <span id="exportStatus" style="font-size:12px; color:var(--color-text-secondary);"></span>
  </div>

  <div class="stat-grid" id="kpiBox">
    <div class="loading-overlay"><i class="ti ti-loader-2"></i> Loading…</div>
  </div>

  <div class="card">
    <table id="mainTable">
      <thead><tr><th>SO Name</th><th>HQ</th><th>Status</th><th>POB Done</th><th>Retailers Met</th><th>PC</th><th>Route</th></tr></thead>
      <tbody id="mainTbody"></tbody>
    </table>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCyGVJtBL4mk0bdTUxN9_SaiM4gwZhdb6k",
  authDomain: "otc-evening-reports.firebaseapp.com",
  databaseURL: "https://otc-evening-reports-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "otc-evening-reports",
  storageBucket: "otc-evening-reports.firebasestorage.app",
  messagingSenderId: "287698321424",
  appId: "1:287698321424:web:a9a618c8fc8386eca5ca95"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roster = {};
let allReports = {};

async function loadData() {
  const rosterSnap = await db.ref('/team_roster').get();
  roster = rosterSnap.val() || {};
  const reportsSnap = await db.ref('/reports').get();
  allReports = reportsSnap.val() || {};

  const dates = Object.keys(allReports).sort().reverse();
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
  sel.onchange = () => renderDate(sel.value);
  if (dates.length) renderDate(dates[0]);
  else document.getElementById('kpiBox').innerHTML = '<div class="stat">No data pushed yet.</div>';
}

function renderDate(date) {
  const dayReports = allReports[date] || {};
  const reportedNames = new Set(Object.values(dayReports).map(r => r.so_name).filter(Boolean));
  const rosterNames = Object.keys(roster).sort();

  const reportedCount = rosterNames.filter(n => reportedNames.has(n)).length;
  const missingCount = rosterNames.length - reportedCount;
  let totalPob = 0;
  Object.values(dayReports).forEach(r => { if (r.pob_done) totalPob += Number(r.pob_done) || 0; });

  document.getElementById('kpiBox').innerHTML = `
    <div class="stat"><div class="stat-label">Total Active SOs</div><div class="stat-val">${rosterNames.length}</div></div>
    <div class="stat"><div class="stat-label">Reported</div><div class="stat-val success">${reportedCount}</div></div>
    <div class="stat"><div class="stat-label">Missing</div><div class="stat-val danger">${missingCount}</div></div>
    <div class="stat"><div class="stat-label">Total POB</div><div class="stat-val">₹${totalPob.toLocaleString()}</div></div>
  `;

  const tbody = document.getElementById('mainTbody');
  let rows = '';
  for (const name of rosterNames) {
    const rec = Object.values(dayReports).find(r => r.so_name === name);
    const hq = (roster[name] && roster[name].hq) || '-';
    if (rec) {
      rows += `<tr><td>${name}</td><td>${hq}</td><td><span class="status-pill s-reported">Reported</span></td><td>${rec.pob_done||'-'}</td><td>${rec.retailers_met||'-'}</td><td>${rec.pc||'-'}</td><td>${rec.route||'-'}</td></tr>`;
    } else {
      rows += `<tr><td>${name}</td><td>${hq}</td><td><span class="status-pill s-missing">Missing</span></td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
    }
  }
  tbody.innerHTML = rows;
}

loadData();

document.getElementById('exportBtn').onclick = () => {
  const statusEl = document.getElementById('exportStatus');
  const fromVal = document.getElementById('exportFrom').value;
  const toVal = document.getElementById('exportTo').value;
  if (!fromVal || !toVal) { statusEl.textContent = 'Pick both dates.'; return; }
  if (fromVal > toVal) { statusEl.textContent = 'From date must be before To date.'; return; }

  const rosterNames = Object.keys(roster).sort();
  const datesInRange = Object.keys(allReports).filter(d => d >= fromVal && d <= toVal).sort();

  if (!datesInRange.length) { statusEl.textContent = 'No data in that range.'; return; }

  const rows = [];
  for (const date of datesInRange) {
    const dayReports = allReports[date] || {};
    for (const name of rosterNames) {
      const rec = Object.values(dayReports).find(r => r.so_name === name);
      const hq = (roster[name] && roster[name].hq) || '';
      rows.push({
        'Date': date,
        'SO Name': name,
        'HQ': hq,
        'Status': rec ? 'Reported' : 'Missing',
        'POB Done': rec && rec.pob_done ? Number(rec.pob_done) : '',
        'Retailers Met': rec && rec.retailers_met ? Number(rec.retailers_met) : '',
        'PC': rec && rec.pc ? Number(rec.pc) : '',
        'Route': rec && rec.route ? rec.route : '',
      });
    }
  }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:24},{wch:16},{wch:10},{wch:12},{wch:14},{wch:8},{wch:24}];
  XLSX.utils.book_append_sheet(wb, ws, 'Evening Reports');
  XLSX.writeFile(wb, `OTC_Evening_Reports_${fromVal}_to_${toVal}.xlsx`);
  statusEl.textContent = `Exported ${rows.length} rows.`;
};
</script>
</body>
</html>
